services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: release_tool
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/release_tool?sslmode=disable
      ALLOWED_ORIGIN: http://localhost:3000
    depends_on:
      - postgres
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
